version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: banking-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: banking-frontend

    ports:
      - "8501:8501"

    env_file:
      - .env

    depends_on:
      - backend

    volumes:
      - .:/app